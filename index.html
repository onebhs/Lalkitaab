});

const karz = {
sun: { creditor: "زحل", house: 8 },
moon: { creditor: "عطارد", house: 6 },
mars: { creditor: "کیتو", house: 11 },
mercury: { creditor: "زہرہ", house: 1 },
jupiter: { creditor: "مریخ", house: 10 },
venus: { creditor: "عطارد", house: 12 },
saturn: { creditor: "زہرہ", house: 1 },
rahu: { creditor: "زہرہ", house: 1 },
ketu: { creditor: "مشتری", house: 10 }
};

function getAspects(planet, house) {
let aspects = [];
const seventh = house + 6 > 12 ? house - 6 : house + 6;
aspects.push(seventh);
if (planet === 'mars') {
let fourth = house + 3 > 12 ? house - 9 : house + 3;
let eighth = house + 7 > 12 ? house - 5 : house + 7;
aspects.push(fourth, eighth);
} else if (planet === 'saturn') {
let third = house + 2 > 12 ? house - 10 : house + 2;
let tenth = house + 9 > 12 ? house - 3 : house + 9;
aspects.push(third, tenth);
} else if (planet === 'jupiter') {
let fifth = house + 4 > 12 ? house - 8 : house + 4;
let ninth = house + 8 > 12 ? house - 4 : house + 8;
aspects.push(fifth, ninth);
}
return [...new Set(aspects)];
}

function generateReport() {
const name = document.getElementById('personName').value || 'صاحب';
const houses = {
sun: parseInt(document.getElementById('sunHouse').value),
moon: parseInt(document.getElementById('moonHouse').value),
mars: parseInt(document.getElementById('marsHouse').value),
mercury: parseInt(document.getElementById('mercuryHouse').value),
jupiter: parseInt(document.getElementById('jupiterHouse').value),
venus: parseInt(document.getElementById('venusHouse').value),
saturn: parseInt(document.getElementById('saturnHouse').value),
rahu: parseInt(document.getElementById('rahuHouse').value),
ketu: parseInt(document.getElementById('ketuHouse').value)
};

let report = `<h2>📋 لال کتاب رپورٹ - ${name}</h2><p class="small">گھروں کی پوزیشن کے مطابق تفسیر۔</p><hr>`;

for (let planet in planetNames) {
let h = houses[planet];
let pred = predictions[planet][h] || "کوئی خاص نقصان نہیں۔";
let awake = (awakeHouse[planet] === h) ? "جاگا ہوا" : "";
let sleep = (sleepHouse[planet] === h) ? "سویا ہوا" : "";
let blind = (blindHouse[planet] === h) ? "اندھا" : "";
let status = [awake, sleep, blind].filter(s => s).join("، ");
if (!status) status = "عام حالت (نہ سویا، نہ اندھا)";
let remedy = generalRemedies[planet];
let aspects = getAspects(planet, h);
let aspectList = aspects.map(a => `گھر ${a}`).join('، ');

report += `<div class="planet-card">
<strong>${planetNames[planet]} (گھر ${h})</strong> – <span class="warning">${status}</span><br>
<em>برتاؤ / پیشین گوئی:</em> ${pred}<br>
<em>اسپیکٹ (دِرشٹی):</em> گھر ${aspectList} پر پڑے گی۔<br>
<em>قرض:</em> ${planetNames[planet]} نے <strong>${karz[planet].creditor}</strong> سے قرض لیا ہے (${karz[planet].creditor} کے گھر ${karz[planet].house} میں جانے پر ادا ہوتا ہے)۔<br>
<div class="remedy">🌿 <strong>ٹوٹکا:</strong> ${remedy}</div>
</div>`;
}

report += `<hr><h3>🔗 خاص ملاپ (مشترکہ اثرات)</h3>`;
if (houses.rahu === 4) report += "<p>• <b>راہو چوتھے گھر</b> – ماں کی صحت کمزور، مکان کی پریشانی، جھاڑو اور کوڑا بہانے کا ٹوٹکا ضروری۔</p>";
if (houses.moon === 7) report += "<p>• <b>چاند ساتویں گھر</b> – جذباتی شادی، پارٹنر کا موڈ اتار چڑھاؤ؛ چاندی کا دان مفید۔</p>";
if (houses.mars === 10 && houses.jupiter === 10) report += "<p>• <b>مریخ + مشتری دسویں</b> – کیریئر میں جدوجہد اور گرو کا سہارا، ترقی 34-36 سال کی عمر میں ہوگی۔</p>";
if (houses.sun === 11 && houses.ketu === 11) report += "<p>• <b>سورج + کیتو گیارہویں</b> – امیدیں ادھوری، لیکن اچانک فائدہ (کیتو)۔ سورج کو گڑ دان کریں۔</p>";
if (houses.mercury === 12 && houses.saturn === 12) report += "<p>• <b>عطارد + زحل بارہویں</b> – خرچ بہت، بیرون ملک تعلق؛ ناک میں سونے کا کیل اور ہری مونگ دان سے فائدہ۔</p>";
if (houses.venus === 1) report += "<p>• <b>زہرہ پہلے گھر</b> – شخصیت دلکش، لیکن عیاشی؛ سفید مٹھائی کا دان اور چچا کی خدمت کریں۔</p>";

report += `<hr><h3>🌿 آپ کے لیے خاص ٹوٹکے</h3><ul>
<li><b>ہر ہفتہ:</b> کالی ارد، تیل، لوہے کا دان، کتے کو روٹی (زحل کا قرض اترے گا)۔</li>
<li><b>ہر بدھ:</b> ہری مونگ بہتے پانی میں (عطارد کا قرض زہرہ کو)۔</li>
<li><b>ہر جمعہ:</b> سفید مٹھائی، چاندی کا برتن (زہرہ مضبوط، راہو ٹھنڈا)۔</li>
<li><b>روزانہ:</b> جھاڑو لگا کر کوڑا بہتے پانی میں بہائیں (راہو کا اثر کم)۔</li>
<li><b>ناک میں سونے کا چھوٹا کیل</b> – زحل کی نظر سے قرض گھٹائے گا۔</li>
<li><b>باپ کی خدمت اور گڑ کا دان</b> – سورج کی شانتی۔</li>
</ul>`;

document.getElementById('reportArea').innerHTML = report;
document.getElementById('reportArea').style.display = 'block';
window.scrollTo(0, document.getElementById('reportArea').offsetTop - 20);
}
</script>
